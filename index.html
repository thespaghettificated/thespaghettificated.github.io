<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Spaghettificated - App Development & Music Production beyond the Event Horizon.</title>
    <style>
        body {
            background-color: #000; /* ブラックホールをイメージした黒 */
            color: #fff; /* 文字は白 */
            font-family: 'Courier New', Courier, monospace; /* エンジニアらしいフォント */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden; /* 文字が引き伸ばされても画面からはみ出さないように */
        }

        .container {
            text-align: center;
        }

        /* Spaghettificatedロゴのアニメーション */
        .spaghettified-title {
            font-size: 3rem;
            font-weight: bold;
            display: inline-block;
            animation: spaghettify 10s ease-in-out infinite; /* 10秒かけてループ */
            transform-origin: center center;
        }

        /* 文字が引き伸ばされるアニメーション */
        @keyframes spaghettify {
            0%, 100% {
                transform: scaleX(1) scaleY(1);
                letter-spacing: 0.1em;
                opacity: 1;
            }
            15% {
                transform: scaleX(0.1) scaleY(1.2); /* 縦に引き伸ばされ、横に縮む */
                letter-spacing: -0.2em;
                opacity: 0.8;
            }
            30% {
                transform: scaleX(1.5) scaleY(0.8); /* 横に広がり、縦に縮む */
                letter-spacing: 0.5em;
                opacity: 0.9;
            }
            50% {
                transform: scaleX(0.1) scaleY(1.5); /* さらに縦に引き伸ばされる */
                letter-spacing: -0.1em;
                opacity: 0.7;
            }
            70% {
                transform: scaleX(1) scaleY(1); /* 元に戻る */
                letter-spacing: 0.1em;
                opacity: 1;
            }
            85% {
                transform: scaleX(0.1) scaleY(1.2) rotate(-5deg); /* 少し回転して引き伸ばされる */
                letter-spacing: -0.2em;
                opacity: 0.8;
            }
        }

        .subtitle {
            margin-top: 2rem;
            font-size: 1.2rem;
            opacity: 0.7;
        }

        .services {
            margin-top: 3rem;
            display: flex;
            justify-content: center;
            gap: 2rem;
        }

        .service-box {
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 1.5rem;
            width: 200px;
            transition: all 0.3s ease;
        }

        .service-box:hover {
            border-color: rgba(255, 255, 255, 0.8);
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(255, 255, 255, 0.1);
        }

        .service-box h3 {
            margin-top: 0;
            font-size: 1.5rem;
        }

        .links {
            margin-top: 4rem;
        }

        .links a {
            color: #fff;
            text-decoration: none;
            margin: 0 1rem;
            opacity: 0.5;
            transition: opacity 0.3s ease;
        }

        .links a:hover {
            opacity: 1;
        }

        /* 「工事中」プレースホルダー */
        .status {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.3);
        }

    </style>
</head>
<body>
    <div class="status">status: Spaghettificating... (Under Construction)</div>

    <div class="container">
        <div class="spaghettified-title">The Spaghettificated</div>
        
        <div class="subtitle">
            App Development & Music Production beyond the Event Horizon.
        </div>

        <div class="services">
            <div class="service-box">
                <h3>App</h3>
                <p>Developing apps that transcend the user experience.</p>
                </div>
            <div class="service-box">
                <h3>Music</h3>
                <p>Producing sounds that resonate across dimensions.</p>
                </div>
        </div>

        <div class="links">
            <a href="#">About</a>
            <a href="#">Contact</a>
            <a href="privacy-policy.html">Privacy Policy</a>
        </div>
    </div>
</body>
</html>
